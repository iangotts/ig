<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<title>BottleRock 2026 — Full Festival Grid</title>
<style>
  :root {
    --bg: #f3f4f6;
    --card: #ffffff;
    --ink: #14161c;
    --muted: #868b95;
    --line: #e4e6ea;
    --line-soft: #eef0f3;
    --natalie: #c9a84c;
    --ian: #7d4fc7;
    --gabi: #2f7fc4;
    --now: #ff3b30;
    --gutter: 44px;
    --col: 146px;
    --head: 48px;
    --hourpx: 140px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex; flex-direction: column;
    height: 100dvh; overflow: hidden;
  }

  /* ---------- Top bar ---------- */
  .topbar { flex: none; background: #fff; border-bottom: 1px solid var(--line); padding-top: env(safe-area-inset-top); }
  .title-row { display: flex; align-items: center; gap: 8px; padding: 9px 12px 7px 14px; }
  .title { font-size: 16px; font-weight: 800; letter-spacing: -0.02em; }
  .title span { color: var(--natalie); }
  .exportbtn {
    margin-left: auto; appearance: none; font-family: inherit; cursor: pointer;
    background: var(--ink); color: #fff; border: none; border-radius: 9px;
    padding: 6px 11px; font-size: 11.5px; font-weight: 700;
  }
  .daytabs { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; padding: 0 10px 8px; }
  .daytab {
    appearance: none; border: 1px solid var(--line); background: #fff;
    border-radius: 10px; padding: 6px 4px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 1px;
    font-family: inherit; color: var(--muted); transition: all .14s ease;
  }
  .daytab .d1 { font-size: 13px; font-weight: 800; }
  .daytab .d2 { font-size: 9.5px; font-weight: 600; }
  .daytab.active { background: var(--ink); border-color: var(--ink); color: #fff; }
  .legend {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 7px 14px; font-size: 10.5px; color: var(--muted);
    background: var(--bg); border-top: 1px solid var(--line-soft);
  }
  .lg { display: flex; align-items: center; gap: 4px; }
  .star { font-size: 12px; line-height: 1; }
  .star.natalie { color: var(--natalie); }
  .star.ian { color: var(--ian); }
  .star.gabi { color: var(--gabi); }
  .fb-label { font-size: 10.5px; font-weight: 800; color: var(--muted);
    letter-spacing: .04em; text-transform: uppercase; }
  .fchip {
    appearance: none; font-family: inherit; cursor: pointer;
    border: 1.5px solid var(--line); background: #fff; color: var(--muted);
    border-radius: 20px; padding: 4px 10px 4px 8px; font-size: 11px; font-weight: 700;
    display: flex; align-items: center; gap: 5px;
  }
  .fchip .fdot { width: 8px; height: 8px; border-radius: 50%; background: var(--pc); flex: none; }
  .fchip.on { background: var(--pc); border-color: var(--pc); color: #fff; }
  .fchip.on .fdot { background: #fff; }
  .fb-status { font-size: 10.5px; font-weight: 700; color: var(--ink); margin-left: auto; }
  .fb-clear {
    appearance: none; font-family: inherit; cursor: pointer; font-size: 10.5px; font-weight: 700;
    background: none; border: none; color: var(--ian); text-decoration: underline; padding: 0;
  }

  /* ---------- Scroller (two-axis) ---------- */
  .scroller { flex: 1; overflow: auto; -webkit-overflow-scrolling: touch; background: var(--bg); }
  .board { position: relative; width: calc(var(--gutter) + 6 * var(--col)); }

  .headrow {
    position: sticky; top: 0; z-index: 20;
    display: flex; height: var(--head); width: calc(var(--gutter) + 6 * var(--col));
  }
  .corner {
    position: sticky; left: 0; z-index: 5; width: var(--gutter); flex: none;
    background: var(--ink); color: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border-right: 1px solid var(--ink);
  }
  .corner .c1 { font-size: 11px; font-weight: 800; }
  .corner .c2 { font-size: 7.5px; font-weight: 600; opacity: .7; }
  .stagehead {
    width: var(--col); flex: none;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 1px; border-right: 1px solid var(--line); border-bottom: 2px solid currentColor;
  }
  .stagehead .sh-name { font-size: 12.5px; font-weight: 800; letter-spacing: -0.01em; }
  .stagehead .sh-sub { font-size: 8px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }

  .body { position: relative; display: flex; width: calc(var(--gutter) + 6 * var(--col)); }
  .gutter {
    position: sticky; left: 0; z-index: 10; width: var(--gutter); flex: none;
    background: #fbfbfc; border-right: 1px solid var(--line);
  }
  .hourlab {
    position: absolute; left: 0; right: 3px; text-align: right;
    font-size: 9px; font-weight: 700; color: var(--muted); font-variant-numeric: tabular-nums;
  }
  .stagecol {
    width: var(--col); flex: none; position: relative; border-right: 1px solid var(--line);
    background-image: repeating-linear-gradient(
      to bottom, var(--line-soft) 0, var(--line-soft) 1px,
      transparent 1px, transparent var(--hourpx));
  }

  /* ---------- Act cells ---------- */
  .act {
    position: absolute; left: 4px; right: 4px; overflow: hidden;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 7px; padding: 5px 6px;
    display: flex; flex-direction: column; gap: 1px;
    cursor: pointer; transition: transform .07s ease, opacity .16s ease;
  }
  .act:active { transform: scale(0.97); }
  .act.has-pick { border-color: #cfd3da; box-shadow: 0 1px 3px rgba(20,22,28,.07); }
  .act.est { border-style: dashed; }
  .act.dim { opacity: .14; }
  .act.match { box-shadow: 0 0 0 2px var(--ink); }
  .a-band {
    font-size: 11.5px; font-weight: 700; line-height: 1.13; letter-spacing: -0.015em;
    color: var(--ink); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }
  .a-time { font-size: 9px; font-weight: 600; color: var(--muted); font-variant-numeric: tabular-nums; margin-top: auto; }
  .a-stars { position: absolute; top: 3px; right: 4px; display: flex; gap: 1px; line-height: 1; }
  .a-stars span { font-size: 9.5px; }

  .nowline {
    position: absolute; left: var(--gutter); right: 0; height: 0;
    border-top: 2px solid var(--now); z-index: 8; pointer-events: none; display: none;
  }
  .nowline::before { content:""; position:absolute; left:0; top:-4px; width:7px; height:7px; border-radius:50%; background:var(--now); }
  .nowtag { position:absolute; left:2px; top:-8px; background:var(--now); color:#fff; font-size:8px; font-weight:800; padding:1px 4px; border-radius:3px; }

  .nowbtn {
    position: fixed; right: 14px; bottom: calc(16px + env(safe-area-inset-bottom));
    z-index: 30; appearance: none; font-family: inherit; cursor: pointer;
    background: var(--ink); color: #fff; border: none; border-radius: 22px;
    padding: 10px 15px; font-size: 13px; font-weight: 700;
    box-shadow: 0 4px 14px rgba(20,22,28,.32); display: none; align-items: center; gap: 6px;
  }
  .nowbtn.show { display: flex; }
  .nowbtn .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--now); }

  /* ---------- Sheet ---------- */
  .backdrop {
    position: fixed; inset: 0; z-index: 60; background: rgba(15,17,22,.45);
    opacity: 0; pointer-events: none; transition: opacity .2s ease;
  }
  .backdrop.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 61; background: #fff;
    border-radius: 20px 20px 0 0; padding: 8px 22px calc(24px + env(safe-area-inset-bottom));
    transform: translateY(110%); transition: transform .26s cubic-bezier(.32,.72,0,1);
    box-shadow: 0 -8px 40px rgba(15,17,22,.22); max-height: 90vh; overflow-y: auto;
  }
  .sheet.open { transform: translateY(0); }
  .sheet-handle { width: 38px; height: 5px; border-radius: 3px; background: var(--line); margin: 6px auto 14px; }
  .sheet-controls { position: absolute; top: 12px; right: 14px; display: flex; gap: 8px; z-index: 3; }
  .ctrl-btn {
    width: 33px; height: 33px; border-radius: 50%; border: none; padding: 0;
    background: var(--bg); color: var(--ink); cursor: pointer; font-family: inherit;
    display: flex; align-items: center; justify-content: center;
    transition: background .12s ease, color .12s ease;
  }
  .ctrl-btn svg { width: 16px; height: 16px; fill: currentColor; }
  .ctrl-btn:active { background: var(--line); }
  .ctrl-btn.done { background: #15a06b; color: #fff; }
  .sheet-eyebrow { font-size: 10.5px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; padding-right: 78px; }
  .sheet-band { font-size: 23px; font-weight: 800; letter-spacing: -0.025em; line-height: 1.12; margin: 4px 0 8px; padding-right: 78px; }
  .sheet-time { font-size: 13.5px; color: var(--muted); font-weight: 600; font-variant-numeric: tabular-nums; }
  .stat-row {
    display: flex; justify-content: space-between; align-items: baseline; gap: 16px;
    padding: 10px 0; border-bottom: 1px solid var(--line-soft);
  }
  .stat-key { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); flex: none; }
  .stat-val { font-size: 13.5px; font-weight: 600; text-align: right; line-height: 1.4; }
  .stat-val b { font-size: 18px; font-weight: 800; letter-spacing: -0.02em; }
  .stats { margin-top: 12px; }
  .vibe { margin-top: 12px; font-size: 14px; line-height: 1.5; }
  .alsoplaying { margin-top: 13px; border-top: 1px solid var(--line-soft); padding-top: 11px; }
  .also-title {
    font-size: 11px; font-weight: 800; letter-spacing: .05em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px;
  }
  .also-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; }
  .also-row + .also-row { border-top: 1px solid var(--line-soft); }
  .also-row .ad {
    font-size: 9.5px; font-weight: 800; letter-spacing: .04em; flex: none;
    padding: 3px 6px; border-radius: 5px; background: var(--ink); color: #fff;
  }
  .also-row .as {
    font-size: 12.5px; font-weight: 600; color: var(--ink);
    flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .also-row .at { font-size: 11.5px; font-weight: 600; color: var(--muted); flex: none; font-variant-numeric: tabular-nums; }
  .spotify-btn {
    margin-top: 14px; width: 100%;
    display: flex; align-items: center; justify-content: center; gap: 9px;
    background: #1DB954; color: #fff; text-decoration: none;
    border-radius: 12px; padding: 13px; font-size: 14px; font-weight: 700;
  }
  .spotify-btn svg { width: 18px; height: 18px; fill: #fff; flex: none; }
  .spotify-btn:active { background: #15913f; }
  .share-btn {
    margin-top: 9px; width: 100%;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: #fff; color: var(--ink);
    border: 1.5px solid var(--line); border-radius: 12px;
    padding: 12px; font-size: 14px; font-weight: 700;
    font-family: inherit; cursor: pointer; transition: all .12s ease;
  }
  .share-btn svg { width: 16px; height: 16px; fill: currentColor; flex: none; }
  .share-btn:active { background: var(--bg); }
  .share-btn.done { background: var(--ink); color: #fff; border-color: var(--ink); }
  .est-note { margin-top: 10px; font-size: 11.5px; color: var(--muted); }

  /* who's going */
  .who { margin-top: 18px; border-top: 1px solid var(--line); padding-top: 14px; }
  .who-title { font-size: 12px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; margin-bottom: 9px; }
  .prow {
    display: flex; align-items: center; gap: 11px; width: 100%;
    appearance: none; font-family: inherit; cursor: pointer; text-align: left;
    background: var(--bg); border: 1.5px solid var(--line); border-radius: 12px;
    padding: 12px 13px; margin-bottom: 7px; transition: all .12s ease;
  }
  .prow .pcheck {
    width: 22px; height: 22px; border-radius: 6px; flex: none;
    border: 2px solid var(--muted); background: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: #fff; font-weight: 800;
  }
  .prow .pname { font-size: 15px; font-weight: 700; }
  .prow .pgoing { margin-left: auto; font-size: 11px; font-weight: 700; color: var(--muted); }
  .prow.on { border-color: var(--pc); background: var(--pc-bg); }
  .prow.on .pcheck { background: var(--pc); border-color: var(--pc); }
  .prow.on .pname { color: var(--pc-ink); }
  .prow.on .pgoing { color: var(--pc-ink); }

  .sheet-close {
    margin-top: 16px; width: 100%; appearance: none; font-family: inherit; cursor: pointer;
    background: var(--ink); color: #fff; border: none;
    border-radius: 12px; padding: 13px; font-size: 14px; font-weight: 700;
  }

  /* export sheet */
  .exp-sub { font-size: 13px; color: var(--muted); line-height: 1.5; margin: 3px 0 12px; }
  .exp-people { display: flex; flex-direction: column; gap: 7px; margin-bottom: 14px; }
  .exp-prow {
    display: flex; align-items: center; gap: 9px;
    border: 1px solid var(--line); border-radius: 10px; padding: 9px 12px; font-size: 13px;
  }
  .exp-prow .dot { width: 10px; height: 10px; border-radius: 50%; flex: none; }
  .exp-prow b { font-weight: 800; }
  .exp-prow .cnt { margin-left: auto; font-weight: 700; color: var(--muted); }
  .exp-area {
    width: 100%; height: 130px; font-family: ui-monospace, Menlo, monospace;
    font-size: 10.5px; border: 1px solid var(--line); border-radius: 10px;
    padding: 10px; resize: none; color: var(--ink); background: var(--bg);
  }
  .copybtn {
    margin-top: 9px; width: 100%; appearance: none; font-family: inherit; cursor: pointer;
    background: #1DB954; color: #fff; border: none; border-radius: 11px;
    padding: 12px; font-size: 13.5px; font-weight: 700;
  }
  .copybtn.done { background: var(--ink); }
</style>
</head>

<div class="topbar">

/* ===================== CONFIG ===================== */
const WIN_START = 12*60, WIN_END = 22*60;
const HOUR_PX = 140, PX_MIN = HOUR_PX/60;
const TL_HEIGHT = (WIN_END-WIN_START)*PX_MIN;
const STORE_KEY = 'br26_picks_v1';

const toMin = t => { const [h,m]=t.split(':').map(Number); return h*60+m; };
const pad2 = n => String(n).padStart(2,'0');
function fmt(min){ let h=Math.floor(min/60),m=min%60,ap=h>=12?'PM':'AM'; let hh=h%12; if(hh===0)hh=12; return hh+':'+pad2(m)+' '+ap; }
const shortT = min => { let h=Math.floor(min/60)%12; if(h===0)h=12; return h+':'+pad2(min%60); };
const esc = s => String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const actKey = (day,stage,a) => day+'|'+stage+'|'+a.b+'|'+a.s;

/* ===================== PICKS STATE ===================== */
function defaultPicks(){
  const p = {};
  for (const day of Object.keys(SCHED))
    for (const stg of Object.keys(SCHED[day]))
      for (const a of SCHED[day][stg]){
        const o = {}; PEOPLE.forEach(pp => o[pp.id] = false);
        if (a.n) o.natalie = true;
        if (a.i) o.ian = true;
        p[actKey(day,stg,a)] = o;
      }
  return p;
}
let picks = (function(){
  const def = defaultPicks();
  try {
    const saved = JSON.parse(localStorage.getItem(STORE_KEY) || 'null');
    if (saved) for (const k in saved) if (def[k]) for (const pid in saved[k]) def[k][pid] = !!saved[k][pid];
  } catch(e){}
  return def;
})();
function savePicks(){ try { localStorage.setItem(STORE_KEY, JSON.stringify(picks)); } catch(e){} }

/* ===================== RENDER ===================== */
const board = document.getElementById('board');
const scroller = document.getElementById('scroller');
const daytabs = document.getElementById('daytabs');
let activeDay = 'fri';

/* ----- filter bar ----- */
const filterPeople = new Set();
const filterbar = document.getElementById('filterbar');
filterbar.innerHTML = `<span class="fb-label">Going</span>`
  + PEOPLE.map(p => `<button class="fchip" data-person="${p.id}" style="--pc:${p.color}"><span class="fdot"></span>${p.name}</button>`).join('')
  + `<span class="fb-status" id="fbStatus"></span>`;
filterbar.querySelectorAll('.fchip').forEach(chip => {
  chip.addEventListener('click', () => {
    const pid = chip.dataset.person;
    if (filterPeople.has(pid)) filterPeople.delete(pid); else filterPeople.add(pid);
    chip.classList.toggle('on', filterPeople.has(pid));
    applyFilter();
  });
});

function applyFilter(){
  const sel = [...filterPeople];
  board.querySelectorAll('.act').forEach(el => {
    const o = picks[el.dataset.key] || {};
    const going = sel.filter(pid => o[pid]).length;     // how many selected people are going
    el.classList.toggle('dim', sel.length > 0 && going === 0);          // nobody selected → fade
    el.classList.toggle('match', sel.length > 1 && going === sel.length); // all selected → outline
  });
  updateFilterStatus();
}
function updateFilterStatus(){
  const sel = [...filterPeople];
  const st = document.getElementById('fbStatus');
  if (sel.length === 0){ st.textContent = 'tap a name'; return; }
  const shown = board.querySelectorAll('.act:not(.dim)').length;
  if (sel.length === 1){
    const name = PEOPLE.find(p => p.id===sel[0]).name;
    st.textContent = shown + (shown===1?' set · ':' sets · ') + name;
  } else {
    const together = board.querySelectorAll('.act.match').length;
    st.textContent = shown + ' shown · ' + together + ' all together';
  }
}

DAYS.forEach(D => {
  const tab = document.createElement('button');
  tab.className = 'daytab'; tab.dataset.day = D.id;
  tab.innerHTML = `<span class="d1">${D.d1}</span><span class="d2">${D.d2}</span>`;
  tab.addEventListener('click', () => selectDay(D.id, true));
  daytabs.appendChild(tab);
});

function starsHTML(key){
  const o = picks[key] || {};
  return PEOPLE.filter(p => o[p.id]).map(p => `<span class="star ${p.id}">★</span>`).join('');
}

function renderBoard(dayId){
  const day = DAYS.find(d => d.id===dayId);
  board.innerHTML = '';

  const headrow = document.createElement('div');
  headrow.className = 'headrow';
  const corner = document.createElement('div');
  corner.className = 'corner';
  corner.innerHTML = `<div class="c1">${day.d1}</div><div class="c2">${day.d2.toUpperCase()}</div>`;
  headrow.appendChild(corner);
  STAGES.forEach(st => {
    const sh = document.createElement('div');
    sh.className = 'stagehead'; sh.style.color = st.color;
    sh.innerHTML = `<span class="sh-name">${st.name}</span><span class="sh-sub">${st.sub}</span>`;
    headrow.appendChild(sh);
  });
  board.appendChild(headrow);

  const body = document.createElement('div');
  body.className = 'body';

  const gutter = document.createElement('div');
  gutter.className = 'gutter'; gutter.style.height = TL_HEIGHT+'px';
  for (let h=0; h<=10; h++){
    const lab = document.createElement('div');
    lab.className = 'hourlab'; lab.style.top = (h*HOUR_PX+3)+'px';
    let hr = (12+h)%12; if (hr===0) hr=12;
    lab.textContent = hr;
    gutter.appendChild(lab);
  }
  body.appendChild(gutter);

  STAGES.forEach(st => {
    const col = document.createElement('div');
    col.className = 'stagecol'; col.style.height = TL_HEIGHT+'px';
    (SCHED[dayId][st.id]||[]).forEach(a => col.appendChild(makeAct(a, st, dayId)));
    body.appendChild(col);
  });

  const nl = document.createElement('div');
  nl.className = 'nowline';
  nl.innerHTML = `<span class="nowtag">NOW</span>`;
  body.appendChild(nl);

  board.appendChild(body);
}

function makeAct(a, st, dayId){
  const s = toMin(a.s), e = toMin(a.e);
  const key = actKey(dayId, st.id, a);
  const el = document.createElement('div');
  const anyPick = PEOPLE.some(p => (picks[key]||{})[p.id]);
  el.className = 'act' + (anyPick?' has-pick':'') + (a.x?' est':'');
  el.dataset.key = key;
  el.style.top = ((s-WIN_START)*PX_MIN)+'px';
  el.style.height = ((e-s)*PX_MIN - 4)+'px';

  const band = document.createElement('div');
  band.className = 'a-band'; band.textContent = a.b;
  const time = document.createElement('div');
  time.className = 'a-time'; time.textContent = (a.x?'~':'')+shortT(s)+'–'+shortT(e);
  const stars = document.createElement('div');
  stars.className = 'a-stars'; stars.innerHTML = starsHTML(key);

  el.appendChild(band); el.appendChild(time); el.appendChild(stars);
  el.addEventListener('click', () => openSheet(a, st, dayId, key));
  return el;
}

function refreshCell(key){
  const el = board.querySelector(`.act[data-key="${cssEsc(key)}"]`);
  if (!el) return;
  el.querySelector('.a-stars').innerHTML = starsHTML(key);
  el.classList.toggle('has-pick', PEOPLE.some(p => (picks[key]||{})[p.id]));
}
function cssEsc(s){ return s.replace(/["\\]/g,'\\$&'); }

/* ===================== DAY SELECT ===================== */
function selectDay(id, scroll){
  activeDay = id;
  document.querySelectorAll('.daytab').forEach(t => t.classList.toggle('active', t.dataset.day===id));
  renderBoard(id);
  updateNow();
  applyFilter();
  if (scroll){
    scroller.scrollLeft = 0;
    if (id===festDay() && festNow()) scrollToNow(); else scroller.scrollTop = 0;
  }
}

/* ===================== NOW ===================== */
function todayISO(){ const d=new Date(); return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()); }
function festDay(){ const t=todayISO(); const d=DAYS.find(x=>x.iso===t); if(d)return d.id; return t<DAYS[0].iso?DAYS[0].id:DAYS[DAYS.length-1].id; }
function festNow(){ return DAYS.some(d=>d.iso===todayISO()); }
function nowMin(){ const d=new Date(); return d.getHours()*60+d.getMinutes(); }
function updateNow(){
  const nl = board.querySelector('.nowline'); if(!nl) return;
  const onDay = festNow() && DAYS.find(d=>d.id===activeDay).iso===todayISO();
  const nm = nowMin(), show = onDay && nm>=WIN_START && nm<=WIN_END;
  if (show){
    nl.style.display='block';
    nl.style.top=((nm-WIN_START)*PX_MIN)+'px';
    nl.querySelector('.nowtag').textContent='NOW '+fmt(nm).replace(' ','');
  } else nl.style.display='none';
  document.getElementById('nowbtn').classList.toggle('show', festNow() && nm>=WIN_START && nm<=WIN_END);
}
function scrollToNow(){
  const nl = board.querySelector('.nowline');
  if(!nl || nl.style.display==='none'){ scroller.scrollTop=0; return; }
  scroller.scrollTop = Math.max(0, parseFloat(nl.style.top)-110);
}
document.getElementById('nowbtn').addEventListener('click', () => {
  selectDay(festDay(), false);
  requestAnimationFrame(() => { scroller.scrollLeft=0; scrollToNow(); });
});

/* ===================== SHEET ===================== */
const backdrop = document.getElementById('backdrop');
const sheet = document.getElementById('sheet');
const sheetContent = document.getElementById('sheetContent');
const ctrlShare = document.getElementById('ctrlShare');

function spotifyHref(band){
  const info = BANDS[band];
  return (info && info.sid)
    ? 'https://open.spotify.com/artist/' + info.sid
    : 'https://open.spotify.com/search/' + encodeURIComponent(band);
}
function mlHTML(m){
  if (/^[~\d]/.test(m)) return `<b>${m}</b> monthly listeners`;
  return m;
}
const SPOT_SVG = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.508 17.314a.748.748 0 0 1-1.029.25c-2.818-1.722-6.366-2.111-10.544-1.156a.748.748 0 1 1-.333-1.459c4.571-1.044 8.494-.595 11.656 1.336a.748.748 0 0 1 .25 1.029zm1.47-3.272a.936.936 0 0 1-1.287.308c-3.226-1.983-8.145-2.557-11.961-1.398a.936.936 0 1 1-.543-1.79c4.36-1.323 9.779-.683 13.483 1.593a.936.936 0 0 1 .308 1.287zm.126-3.408C15.51 8.46 8.876 8.227 5.026 9.395a1.122 1.122 0 1 1-.651-2.148c4.421-1.342 11.748-1.083 16.272 1.603a1.122 1.122 0 0 1-1.146 1.929z"/></svg>';
const SHARE_SVG = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 1H6a2 2 0 0 0-2 2v12h2V3h10V1zm3 4H10a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H10V7h9v14z"/></svg>';
const CHECK_SVG = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 16.17 4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';

function execCopy(text){
  try {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.top='-9999px'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  } catch(e){}
}
function copyText(text, onDone){
  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(onDone, () => { execCopy(text); onDone(); });
  } else { execCopy(text); onDone(); }
}

function otherSets(band, dayId, stageId, start){
  const order = {fri:0, sat:1, sun:2};
  const out = [];
  for (const d of Object.keys(SCHED))
    for (const stg of Object.keys(SCHED[d]))
      for (const a of SCHED[d][stg])
        if (a.b === band && !(d===dayId && stg===stageId && a.s===start))
          out.push({ day:d, stage:stg, s:a.s, e:a.e });
  out.sort((x,y) => order[x.day]-order[y.day] || toMin(x.s)-toMin(y.s));
  return out;
}

function openSheet(a, st, dayId, key){
  const day = DAYS.find(d=>d.id===dayId);
  const info = BANDS[a.b] || {g:'—', m:'Emerging act', sid:null, v:'No details available yet.'};

  const others = otherSets(a.b, dayId, st.id, a.s);
  let alsoHTML = '';
  if (others.length){
    const rows = others.map(o => {
      const dd = DAYS.find(d => d.id===o.day).d1;
      const sname = STAGES.find(s => s.id===o.stage).full;
      return `<div class="also-row"><span class="ad">${dd}</span>`
        + `<span class="as">${esc(sname)}</span>`
        + `<span class="at">${fmt(toMin(o.s))} – ${fmt(toMin(o.e))}</span></div>`;
    }).join('');
    alsoHTML = `<div class="alsoplaying">`
      + `<div class="also-title">Also playing — ${others.length} more set${others.length>1?'s':''}</div>`
      + rows + `</div>`;
  }

  const whoRows = PEOPLE.map(p => {
    const on = (picks[key]||{})[p.id];
    return `<button class="prow${on?' on':''}" data-person="${p.id}"
      style="--pc:${p.color};--pc-bg:${p.bg};--pc-ink:${p.ink}">
      <span class="pcheck">${on?'✓':''}</span>
      <span class="pname">${p.name}</span>
      <span class="pgoing">${on?'Going':'Tap to add'}</span>
    </button>`;
  }).join('');

  sheetContent.innerHTML = `
    <div class="sheet-eyebrow" style="color:${st.color}">${st.name} Stage · ${day.d2}</div>
    <div class="sheet-band">${esc(a.b)}</div>
    <div class="sheet-time">${a.x?'approx. ':''}${fmt(toMin(a.s))} – ${fmt(toMin(a.e))}</div>
    <div class="stats">
      <div class="stat-row"><span class="stat-key">Genre</span><span class="stat-val">${esc(info.g)}</span></div>
      <div class="stat-row"><span class="stat-key">Spotify</span><span class="stat-val">${mlHTML(info.m)}</span></div>
    </div>
    <div class="vibe">${esc(info.v)}</div>
    ${alsoHTML}
    <a class="spotify-btn" href="${spotifyHref(a.b)}" target="_blank" rel="noopener noreferrer">${SPOT_SVG} Open artist on Spotify</a>
    ${a.x?'<div class="est-note">End time is approximate — confirm in the BottleRock app.</div>':''}
    <div class="who">
      <div class="who-title">Who’s going?</div>
      ${whoRows}
    </div>
  `;
  sheetContent.querySelectorAll('.prow').forEach(row => {
    row.addEventListener('click', () => {
      const pid = row.dataset.person;
      const cur = !(picks[key] && picks[key][pid]);
      if (!picks[key]){ picks[key] = {}; PEOPLE.forEach(pp=>picks[key][pp.id]=false); }
      picks[key][pid] = cur;
      savePicks();
      row.classList.toggle('on', cur);
      row.querySelector('.pcheck').textContent = cur?'✓':'';
      row.querySelector('.pgoing').textContent = cur?'Going':'Tap to add';
      refreshCell(key);
      applyFilter();
    });
  });
  const shareText = a.b + ', ' + st.full + ', ' + fmt(toMin(a.s)) + ' – ' + fmt(toMin(a.e));
  ctrlShare.style.display = 'flex';
  ctrlShare.classList.remove('done');
  ctrlShare.innerHTML = SHARE_SVG;
  ctrlShare.onclick = () => {
    copyText(shareText, () => { ctrlShare.classList.add('done'); ctrlShare.innerHTML = CHECK_SVG; });
  };
  openBackdrop();
}

/* ----- export ----- */
function buildExport(){
  const out = { festival:'BottleRock 2026', exported:new Date().toISOString(), people:{} };
  PEOPLE.forEach(p => out.people[p.id] = { name:p.name, color:p.color, picks:[] });
  for (const day of Object.keys(SCHED))
    for (const stg of Object.keys(SCHED[day]))
      for (const a of SCHED[day][stg]){
        const k = actKey(day,stg,a), o = picks[k]||{};
        const stageName = STAGES.find(s=>s.id===stg).name;
        PEOPLE.forEach(p => {
          if (o[p.id]) out.people[p.id].picks.push(
            { day, stage:stageName, band:a.b, start:a.s, end:a.e });
        });
      }
  return out;
}
function openExport(){
  const data = buildExport();
  const json = JSON.stringify(data, null, 1);
  const rows = PEOPLE.map(p => `<div class="exp-prow">
      <span class="dot" style="background:${p.color}"></span>
      <b>${p.name}</b><span class="cnt">${data.people[p.id].picks.length} sets</span>
    </div>`).join('');
  sheetContent.innerHTML = `
    <div class="sheet-band" style="font-size:21px">Export picks</div>
    <div class="exp-sub">Everyone’s current check-ins. Copy this and send it back to rebuild the
      coordinate page with all of you.</div>
    <div class="exp-people">${rows}</div>
    <textarea class="exp-area" id="expArea" readonly>${esc(json)}</textarea>
    <button class="copybtn" id="copyBtn">Copy to clipboard</button>
  `;
  ctrlShare.style.display = 'none';
  const ta = document.getElementById('expArea');
  document.getElementById('copyBtn').addEventListener('click', () => {
    ta.select(); ta.setSelectionRange(0, 99999);
    const btn = document.getElementById('copyBtn');
    const done = () => { btn.textContent = 'Copied ✓'; btn.classList.add('done'); };
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(ta.value).then(done, () => { try{document.execCommand('copy');done();}catch(e){} });
    } else { try{document.execCommand('copy');done();}catch(e){} }
  });
  openBackdrop();
}
document.getElementById('exportbtn').addEventListener('click', openExport);

function openBackdrop(){ backdrop.classList.add('open'); sheet.classList.add('open'); sheet.scrollTop = 0; }
function closeSheet(){ backdrop.classList.remove('open'); sheet.classList.remove('open'); }
backdrop.addEventListener('click', closeSheet);
document.getElementById('ctrlClose').addEventListener('click', closeSheet);

/* ===================== INIT ===================== */
function init(){
  selectDay(festDay(), false);
  updateNow();
  requestAnimationFrame(() => {
    scroller.scrollLeft = 0;
    if (festNow()) scrollToNow(); else scroller.scrollTop = 0;
  });
}
window.addEventListener('load', init);
setInterval(updateNow, 60000);
document.addEventListener('visibilitychange', () => { if(!document.hidden) updateNow(); });
</script>
</body>
